name: Live EDGAR sync

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: live-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install chart dependencies
        run: pip install matplotlib cairosvg

      - name: Full EDGAR + market sync
        run: python3 build/run_full_sync.py
        env:
          MUSK_WATCH_NO_MAC: "1"
          MUSK_WATCH_PIPELINE: "0"
          MUSK_LINKEDIN_ALERT: "0"
          MUSK_DOSSIER_URL: https://kaydeep0.github.io/musk-empire-dossier/
          MUSK_ALERT_EMAIL: kiran@wattsadvisor.com
          MUSK_ALERT_SMS: "+12792692780"
          MUSK_SMTP_HOST: ${{ secrets.MUSK_SMTP_HOST }}
          MUSK_SMTP_PORT: ${{ secrets.MUSK_SMTP_PORT }}
          MUSK_SMTP_USER: ${{ secrets.MUSK_SMTP_USER }}
          MUSK_SMTP_PASS: ${{ secrets.MUSK_SMTP_PASS }}
          MUSK_SMTP_FROM: ${{ secrets.MUSK_SMTP_FROM }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM: ${{ secrets.TWILIO_FROM }}
          MUSK_WATCH_NTFY: https://ntfy.sh/musk-sec-9053334806

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/ data/ charts/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "no changes"
            exit 0
          fi
          git commit -m "Live sync: EDGAR bot $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
